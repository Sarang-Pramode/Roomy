[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roomy-observability"
version = "0.1.1"
description = "Local-first LangChain agent observability: traces, context segments, tokens, CLI & web UI"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Sarang Pramode" }]
keywords = ["langchain", "observability", "tracing", "llm", "agents"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "pydantic>=2.6",
  "typer>=0.12",
  "langchain-core>=0.3",
  "PyYAML>=6.0",
]

[project.optional-dependencies]
api = ["fastapi>=0.115", "uvicorn[standard]>=0.30"]
openai = ["tiktoken>=0.7"]
examples = [
  "langgraph>=0.2.0",
  "langchain-openai>=0.2.0",
  "python-dotenv>=1.0.0",
  "httpx>=0.27.0",
]
dev = [
  "pytest>=8.0",
  "ruff>=0.6",
  "mypy>=1.11",
  "httpx>=0.27",
  "build>=1.2",
  "twine>=5.0",
]
all = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "tiktoken>=0.7",
  "pytest>=8.0",
  "ruff>=0.6",
  "mypy>=1.11",
  "httpx>=0.27",
  "build>=1.2",
  "twine>=5.0",
]

[project.scripts]
roomy = "roomy.cli.main:app"

[project.urls]
Homepage = "https://github.com/Sarang-Pramode/Roomy"
Repository = "https://github.com/Sarang-Pramode/Roomy"
Documentation = "https://github.com/Sarang-Pramode/Roomy#readme"
Changelog = "https://github.com/Sarang-Pramode/Roomy/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["src/roomy"]

[tool.hatch.build.targets.sdist]
include = ["src/roomy", "README.md", "LICENSE"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["UP042"]

[tool.ruff.lint.per-file-ignores]
"src/roomy/instrumentation/manager.py" = ["E501"]
"src/roomy/api/app.py" = ["E501"]
"tests/test_upstream.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
packages = ["roomy"]
strict = false

[tool.pytest.ini_options]
testpaths = ["tests"]
