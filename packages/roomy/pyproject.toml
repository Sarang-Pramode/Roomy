[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roomy-observability"
version = "0.1.0"
description = "Roomy — local-first LangChain agent context observability (import as `roomy`)"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Sarang Pramode" }]
keywords = ["langchain", "observability", "tracing", "llm", "agents"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "pydantic>=2.6",
  "typer>=0.12",
  "langchain-core>=0.3",
  "PyYAML>=6.0",
]

[project.optional-dependencies]
api = ["fastapi>=0.115", "uvicorn[standard]>=0.30"]
openai = ["tiktoken>=0.7"]
dev = ["pytest>=8.0", "ruff>=0.6", "mypy>=1.11", "httpx>=0.27"]
all = ["fastapi>=0.115", "uvicorn[standard]>=0.30", "tiktoken>=0.7", "pytest>=8.0", "ruff>=0.6", "mypy>=1.11", "httpx>=0.27"]

[project.scripts]
roomy = "roomy.cli.main:app"

[project.urls]
Homepage = "https://pramode.dev"

[tool.hatch.build.targets.wheel]
packages = ["src/roomy"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["UP042"]

[tool.ruff.lint.per-file-ignores]
"src/roomy/instrumentation/manager.py" = ["E501"]
"src/roomy/api/app.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
packages = ["roomy"]
strict = false

[tool.pytest.ini_options]
testpaths = ["tests"]
