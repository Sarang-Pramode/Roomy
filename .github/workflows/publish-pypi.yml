# Publish to PyPI via Trusted Publishing (OIDC). No PyPI token stored in GitHub secrets.
#
# Triggers when you publish a GitHub Release (not on every push to main).
# Flow: bump version on main → push → GitHub → Releases → Draft release → choose tag v* → Publish release.
#
# PyPI form must match this file name: publish-pypi.yml
# If PyPI lists an Environment, this job must set: environment: release (same name as on GitHub).

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install build

      - name: Build sdist and wheel
        working-directory: packages/roomy
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/roomy/dist/
