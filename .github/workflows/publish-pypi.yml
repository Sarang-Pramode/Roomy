# Publish to PyPI when a GitHub Release is published.
# Setup (one-time): https://docs.pypi.org/trusted-publishers/
# PyPI → roomy-observability → Settings → Publishing → add trusted publisher for this repo + workflow file.

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install build

      - name: Build sdist and wheel
        working-directory: packages/roomy
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/roomy/dist/
